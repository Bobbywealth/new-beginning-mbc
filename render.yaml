databases:
  - name: new-beginning-mbc-db
    plan: basic_256mb
    region: oregon
    databaseName: new_beginning_mbc_db
    user: new_beginning_mbc_db_user
    postgresMajorVersion: "16"
    ipAllowList: []  # Locked down; church admin IPs to be added later

services:
  - type: static_site
    name: new-beginning-mbc
    autoDeploy: true
    staticPublishPath: public
    buildCommand: ""
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /dashboard/*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
