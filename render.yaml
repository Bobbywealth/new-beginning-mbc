databases:
  - name: new-beginning-mbc-db
    plan: basic_256mb
    region: oregon
    databaseName: new_beginning_mbc_db
    user: new_beginning_mbc_db_user
    postgresMajorVersion: "16"
    ipAllowList: []  # Locked down; allow specific IPs as needed

services:
  - type: static_site
    name: new-beginning-mbc
    autoDeploy: true
    staticPublishPath: public
    buildCommand: ""
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /dashboard/*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

  - type: web_service
    name: new-beginning-mbc-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: new-beginning-mbc-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000